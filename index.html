<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <title>Берёзка Карта</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ==================== LOADING ==================== -->
    <div id="screen-loading" class="screen active">
        <div class="loader"></div>
        <div class="loader-text">Загрузка...</div>
    </div>

    <!-- ==================== AUTH ==================== -->
    <div id="screen-auth" class="screen">
        <div class="auth-card">
            <div class="auth-logo">
                <h1>Берёзка Карта</h1>
                <p>Отмечай страны, где ты был</p>
            </div>
            <div class="auth-tabs">
                <button id="auth-tab-login" class="auth-tab active">Вход</button>
                <button id="auth-tab-register" class="auth-tab">Регистрация</button>
            </div>
            <input id="auth-username" class="auth-input" type="text" placeholder="Логин" autocomplete="username" autocapitalize="none">
            <input id="auth-password" class="auth-input" type="password" placeholder="Пароль" autocomplete="current-password">
            <button id="auth-btn" class="auth-btn">Войти</button>
            <div id="auth-error" class="auth-error"></div>
        </div>
    </div>

    <!-- ==================== MAP ==================== -->
    <div id="screen-map" class="screen">
        <div class="header">
            <div class="header-title">Берёзка Карта</div>
            <div class="header-nav">
                <button class="nav-btn active" data-screen="map" title="Карта">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"/><path d="M8 2v16"/><path d="M16 6v16"/></svg>
                </button>
                <button class="nav-btn" data-screen="search" title="Поиск">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                </button>
                <button class="nav-btn" data-screen="settings" title="Настройки">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                </button>
            </div>
        </div>
        <div class="stats-bar">
            <div id="stats-count" class="stats-count">Посещено: <span>0</span> / 195 стран</div>
            <div id="country-tooltip" class="country-tooltip"></div>
        </div>
        <div id="map-container" class="map-container">
            <div class="loader" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)"></div>
        </div>
        <div class="zoom-controls">
            <button id="zoom-in" class="zoom-btn">+</button>
            <button id="zoom-out" class="zoom-btn">&minus;</button>
        </div>
        <button id="open-list-btn" class="list-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
            Список стран
        </button>
    </div>

    <!-- ==================== SEARCH ==================== -->
    <div id="screen-search" class="screen">
        <div class="header">
            <div class="header-title">Поиск</div>
            <div class="header-nav">
                <button class="nav-btn" data-screen="map" title="Карта">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"/><path d="M8 2v16"/><path d="M16 6v16"/></svg>
                </button>
                <button class="nav-btn active" data-screen="search" title="Поиск">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                </button>
                <button class="nav-btn" data-screen="settings" title="Настройки">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                </button>
            </div>
        </div>
        <div class="search-panel">
            <div class="search-row">
                <input id="search-input" class="search-input" type="text" placeholder="Введите логин пользователя" autocapitalize="none">
                <button id="search-go" class="search-go">Найти</button>
            </div>
            <div id="search-result"></div>
        </div>
    </div>

    <!-- ==================== SETTINGS ==================== -->
    <div id="screen-settings" class="screen">
        <div class="header">
            <div class="header-title">Настройки</div>
            <div class="header-nav">
                <button class="nav-btn" data-screen="map" title="Карта">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"/><path d="M8 2v16"/><path d="M16 6v16"/></svg>
                </button>
                <button class="nav-btn" data-screen="search" title="Поиск">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                </button>
                <button class="nav-btn active" data-screen="settings" title="Настройки">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                </button>
            </div>
        </div>
        <div class="settings-panel">
            <div class="settings-user">
                <div id="settings-avatar" class="settings-avatar">?</div>
                <div id="settings-username" class="settings-username"></div>
            </div>
            <div class="settings-section">
                <div class="settings-item">
                    <div>
                        <div class="settings-label">Публичная карта</div>
                        <div class="settings-desc">Другие смогут найти и увидеть вашу карту</div>
                    </div>
                    <label class="toggle">
                        <input id="public-toggle" type="checkbox">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
            <button id="logout-btn" class="logout-btn">Выйти из аккаунта</button>
        </div>
    </div>

    <!-- ==================== VIEW USER MAP ==================== -->
    <div id="screen-view" class="screen">
        <div class="view-header">
            <button id="view-back" class="back-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
            </button>
            <div class="view-header-info">
                <h2 id="view-header-name"></h2>
                <p id="view-header-info"></p>
            </div>
        </div>
        <div id="view-map-container" class="map-container">
            <div class="loader" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)"></div>
        </div>
    </div>

    <!-- ==================== COUNTRY LIST MODAL ==================== -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3>Список стран</h3>
                <button id="modal-close" class="modal-close">&times;</button>
            </div>
            <div class="modal-search">
                <input id="modal-search-input" type="text" placeholder="Поиск страны...">
            </div>
            <div id="modal-list" class="modal-list"></div>
        </div>
    </div>

    <!-- ==================== SCRIPTS ==================== -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
